# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/
#
# The Dockerfile copies a pre-built dist/, so the client and server must be
# built here before flyctl deploy.

name: Fly Deploy
on:
    push:
        branches:
            - main
    workflow_dispatch:
    workflow_call:

jobs:
    deploy:
        name: Build and deploy app
        runs-on: ubuntu-latest
        concurrency: deploy-group # ensure only one deploy runs at a time
        steps:
            - uses: actions/checkout@v4
              with:
                  ref: main
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run build
              env:
                  # optional: enables sourcemap upload; build still succeeds without it
                  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
            - uses: superfly/flyctl-actions/setup-flyctl@master
            - run: flyctl deploy --remote-only --dns-checks=false
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
