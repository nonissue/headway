<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Offline — Headway</title>
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        />
        <meta name="theme-color" content="#0a0a0a" />
        <link rel="manifest" href="/manifest.webmanifest" />
        <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180.png" />
        <style>
            :root {
                --bg: #0a0a0a; /* zinc-950 */
                --card: #111114; /* near-zinc-950 w/ slight lift */
                --text: #e5e7eb; /* zinc-200 */
                --muted: #a1a1aa; /* zinc-400 */
                --accent: #f59e0b; /* amber-500 */
                --ring: rgba(245, 158, 11, 0.5);
            }
            * {
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
            }
            body {
                margin: 0;
                color: var(--text);
                background: var(--bg);
                font:
                    14px ui-sans-serif,
                    system-ui,
                    -apple-system,
                    Segoe UI,
                    Roboto,
                    Inter,
                    'Helvetica Neue',
                    Arial,
                    'Apple Color Emoji',
                    'Segoe UI Emoji';
            }
            .wrap {
                min-height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: max(16px, env(safe-area-inset-top))
                    max(16px, env(safe-area-inset-right))
                    max(16px, env(safe-area-inset-bottom))
                    max(16px, env(safe-area-inset-left));
            }
            .card {
                width: min(92vw, 28rem);
                background: color-mix(in oklab, var(--card), transparent 0%);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 14px;
                padding: 20px 18px;
                box-shadow:
                    0 0 0 1px rgba(255, 255, 255, 0.02) inset,
                    0 8px 30px rgba(0, 0, 0, 0.45);
                backdrop-filter: saturate(1.1) blur(6px);
            }
            .row {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .title {
                font-weight: 700;
                letter-spacing: 0.4px;
            }
            .muted {
                color: var(--muted);
            }
            .mt1 {
                margin-top: 0.5rem;
            }
            .mt2 {
                margin-top: 1rem;
            }
            .btn {
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.6rem 0.9rem;
                border-radius: 999px;
                border: 1px solid rgba(255, 255, 255, 0.12);
                background: #171717;
                color: var(--text);
                text-decoration: none;
                cursor: pointer;
                transition: 0.15s ease-in-out;
            }
            .btn:hover {
                background: #1f1f1f;
                color: #111;
                border-color: #efb15b;
            }
            .btn .dot {
                width: 0.6rem;
                height: 0.6rem;
                border-radius: 50%;
                background: var(--accent);
            }
            .btn:focus-visible {
                outline: 2px solid var(--ring);
                outline-offset: 2px;
            }
            .grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 0.5rem;
            }
            .mono {
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
                    'Liberation Mono', 'Courier New', monospace;
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <main class="card" role="main" aria-label="Offline fallback">
                <div class="row">
                    <svg
                        width="20"
                        height="20"
                        viewBox="0 0 24 24"
                        fill="none"
                        aria-hidden="true"
                    >
                        <path
                            d="M12 9v4m0 4h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
                            stroke="#f59e0b"
                            stroke-width="1.5"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        />
                    </svg>
                    <div class="title">You’re offline</div>
                </div>

                <p class="mt1 muted">
                    We couldn’t reach the network. Your last viewed page may
                    still be cached.
                </p>

                <div class="mt2 grid">
                    <button class="btn" onclick="location.reload()">
                        <span class="dot" aria-hidden="true"></span>
                        Try again
                    </button>
                    <a class="btn" href="/" rel="nofollow">
                        <span class="dot" aria-hidden="true"></span>
                        Go to home
                    </a>
                </div>

                <p class="mt2 mono muted" id="hint"></p>
            </main>
        </div>

        <script>
            // Tiny hint for debugging
            (function () {
                const fromSW =
                    'serviceWorker' in navigator &&
                    navigator.serviceWorker.controller;
                const t = new Date().toLocaleTimeString();
                document.getElementById('hint').textContent =
                    `Offline page · ${t} ${fromSW ? '· via SW cache' : ''}`;
            })();
        </script>
    </body>
</html>
